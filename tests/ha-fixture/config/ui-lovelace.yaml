title: Universal Card Fixture
views:
  - title: Overview
    path: overview
    icon: mdi:view-dashboard
    badges: []
    cards:
      - type: custom:universal-card
        title: Living Room
        subtitle: Lights and comfort
        icon: mdi:sofa
        entity: input_boolean.kitchen_light
        theme: glass
        badges:
          - type: state
            entity: input_boolean.kitchen_light
            icon: mdi:lightbulb
            label: Light
            color_rules:
              - operator: ==
                value: on
                color: var(--warning-color)
              - operator: ==
                value: off
                color: var(--secondary-text-color)
          - type: state
            entity: sensor.demo_temperature
            icon: mdi:thermometer
            label: Temp
        body:
          cards:
            - type: entities
              entities:
                - entity: input_boolean.kitchen_light
                - entity: sensor.demo_temperature
                - entity: sensor.demo_humidity
      - type: custom:universal-card
        title: Energy Grid
        subtitle: Grid layout demo
        icon: mdi:flash
        grid:
          columns: 2
          gap: 12px
        body:
          cards:
            - type: gauge
              entity: sensor.demo_temperature
            - type: gauge
              entity: sensor.demo_humidity
            - type: entities
              colspan: 2
              entities:
                - entity: sensor.security_status
                - entity: sensor.network_health_sensor
      - type: custom:universal-card
        title: Advanced Grid
        subtitle: Spans and mixed column sizing
        icon: mdi:grid-large
        theme: minimal
        grid:
          columns: "1.4fr 0.8fr 1fr"
          gap: 10px
        body:
          cards:
            - type: markdown
              colspan: 2
              content: |
                ### Power Mix
                Multi-column composition with spans and mixed card types.
            - type: gauge
              entity: sensor.demo_temperature
              max: 30
            - type: entities
              rowspan: 2
              entities:
                - entity: input_select.house_mode
                - entity: sensor.network_health_sensor
                - entity: counter.notifications
            - type: button
              entity: input_boolean.kitchen_light
              name: Kitchen
            - type: button
              entity: input_boolean.security_armed
              name: Security

  - title: Modes
    path: modes
    icon: mdi:view-carousel
    badges: []
    cards:
      - type: custom:universal-card
        title: Security Controls
        body_mode: modal
        icon: mdi:shield-home
        modal:
          width: auto
          max_width: 72rem
          max_height: 85vh
        grid:
          columns: 2
          gap: 12px
        body:
          cards:
            - type: entities
              entities:
                - entity: input_boolean.security_armed
                - entity: sensor.security_status
            - type: vertical-stack
              cards:
                - type: entities
                  entities:
                    - entity: sensor.demo_temperature
                    - entity: sensor.demo_humidity
      - type: custom:universal-card
        title: Climate Tabs
        body_mode: tabs
        tabs_config:
          content_padding: 12px
          tab_min_width: 96px
          tab_alignment: center
        tabs:
          - label: Climate
            icon: mdi:home-thermometer
            cards:
              - type: entities
                entities:
                  - entity: sensor.demo_temperature
                  - entity: sensor.demo_humidity
          - label: Security
            icon: mdi:shield-lock
            cards:
              - type: entities
                entities:
                  - entity: input_boolean.security_armed
                  - entity: sensor.security_status
      - type: custom:universal-card
        title: Mode Carousel
        body_mode: carousel
        carousel_autoplay: true
        carousel_interval: 4500
        carousel_options:
          show_arrows: true
          show_indicators: true
          loop: true
          height: 20rem
        body:
          cards:
            - type: entities
              title: Status
              entities:
                - entity: sensor.network_health_sensor
                - entity: sensor.house_mode_sensor
            - type: entities
              title: Comfort
              entities:
                - entity: sensor.demo_temperature
                - entity: sensor.demo_humidity
      - type: custom:universal-card
        title: Fullscreen Detail
        body_mode: fullscreen
        fullscreen:
          width: 92vw
          max_width: 96rem
          max_height: 94vh
          padding: 20px
        body:
          cards:
            - type: markdown
              content: |
                ## Fullscreen demo
                Real Home Assistant overlay with nested Lovelace content.
            - type: entities
              entities:
                - entity: sensor.demo_temperature
                - entity: sensor.demo_humidity
                - entity: sensor.network_health_sensor
      - type: custom:universal-card
        title: Route Detail
        body_mode: subview
        subview:
          path: /fixture-dashboard/details
          return_on_close: true

  - title: Details
    path: details
    subview: true
    badges: []
    cards:
      - type: custom:universal-card
        title: Advanced Details
        subtitle: Subview target
        theme: tokyo-night
        expanded: true
        body:
          cards:
            - type: entities
              entities:
                - entity: input_select.house_mode
                - entity: sensor.network_health_sensor
                - entity: counter.notifications

  - title: Header And Badges
    path: header
    icon: mdi:badge-account-horizontal
    badges: []
    cards:
      - type: custom:universal-card
        title: Climate Center
        subtitle: Main floor
        icon: mdi:home-thermometer
        icon_color: var(--accent-color)
        header:
          layout:
            variant: centered
            gap: 16px
            content_gap: 4px
            badges_position: below_content
        badges:
          - type: state
            entity: sensor.security_status
            icon: mdi:shield
            label: Security
            color_rules:
              - operator: ==
                value: armed
                color: var(--warning-color)
              - operator: ==
                value: disarmed
                color: var(--secondary-text-color)
          - type: state
            entity: input_boolean.kitchen_light
            icon: mdi:lightbulb
            icon_only: true
            icon_tap_action:
              action: toggle
            color_rules:
              - operator: ==
                value: on
                color: gold
              - operator: ==
                value: off
                color: var(--secondary-text-color)
        body:
          cards:
            - type: entities
              entities:
                - entity: sensor.demo_temperature
                - entity: sensor.demo_humidity
      - type: custom:universal-card
        title: Footer Actions
        body_mode: modal
        modal:
          width: 80vw
          max_width: 96rem
          loading_strategy: preload
        footer:
          cards:
            - type: button
              name: Archive
            - type: button
              name: Snapshot
        body:
          cards:
            - type: entities
              entities:
                - entity: counter.notifications
                - entity: sensor.house_mode_sensor
      - type: custom:universal-card
        title: Presence Gate
        subtitle: Visibility and actions
        icon: mdi:door
        entity: input_boolean.away_mode
        visibility:
          - condition: state
            entity: sensor.house_mode_sensor
            state: home
        tap_action:
          action: more-info
        hold_action:
          action: navigate
          navigation_path: /fixture-dashboard/details
        badges:
          - type: state
            entity: input_boolean.security_armed
            icon: mdi:shield-check
            label: Armed
            color_rules:
              - operator: ==
                value: on
                color: var(--warning-color)
              - operator: ==
                value: off
                color: var(--secondary-text-color)
        body:
          cards:
            - type: entities
              entities:
                - entity: input_select.house_mode
                - entity: input_boolean.away_mode
      - type: custom:universal-card
        title: Night Stack
        subtitle: Theme and nested cards
        icon: mdi:weather-night
        theme: tokyo-night
        body:
          cards:
            - type: horizontal-stack
              cards:
                - type: gauge
                  entity: sensor.demo_temperature
                  max: 30
                - type: gauge
                  entity: sensor.demo_humidity
                  max: 100
            - type: entities
              entities:
                - entity: sensor.network_health_sensor
                - entity: counter.notifications

  - title: Styling
    path: styling
    icon: mdi:palette-swatch
    badges: []
    cards:
      - type: custom:universal-card
        title: Runtime Styling
        subtitle: Theme tokens and state styles
        icon: mdi:palette-outline
        icon_color: "#ffbf66"
        entity: input_boolean.kitchen_light
        theme: glass
        theme_tokens:
          --uc-background-color: "linear-gradient(145deg, rgba(9, 16, 27, 0.96), rgba(23, 42, 59, 0.92))"
          --uc-border-color: "rgba(117, 204, 255, 0.36)"
          --uc-text-color: "#f8fbff"
          --uc-text-secondary-color: "#bfd7ea"
          --uc-shadow: "0 18px 48px rgba(0, 0, 0, 0.4)"
        state_styles:
          "on":
            border_color: "#f4b400"
            box_shadow: "0 0 0 1px rgba(244, 180, 0, 0.36), 0 24px 52px rgba(244, 180, 0, 0.16)"
          "off":
            opacity: 0.72
        custom_css:
          - scope: header
            css: |
              .header-title {
                letter-spacing: 0.05em;
                text-transform: uppercase;
              }
          - scope: card
            css: |
              .universal-card {
                backdrop-filter: blur(16px);
              }
        badges:
          - type: state
            entity: input_boolean.kitchen_light
            icon: mdi:lightbulb
            label: Scene
            color_rules:
              - operator: ==
                value: "on"
                color: gold
              - operator: ==
                value: "off"
                color: var(--secondary-text-color)
        body:
          cards:
            - type: markdown
              content: |
                **theme_tokens**, `state_styles`, and `custom_css` can be layered together.
      - type: custom:universal-card
        title: Control Surface
        subtitle: Swipe and context hooks
        icon: mdi:gesture-double-tap
        entity: input_boolean.security_armed
        context_menu:
          items:
            - label: Open details
              icon: mdi:open-in-app
              action:
                action: navigate
                navigation_path: /fixture-dashboard/details
            - type: separator
            - label: Toggle alarm
              icon: mdi:shield
              action:
                action: toggle
                entity: input_boolean.security_armed
        swipe:
          enabled: true
          direction: both
          threshold: 48
          velocityThreshold: 0.2
          preventScroll: true
          left:
            action: next
          right:
            action: prev
        footer:
          actions:
            - icon: mdi:open-in-app
              label: Details
              action: navigate
              navigation_path: /fixture-dashboard/details
            - icon: mdi:shield-check
              label: Toggle
              action: toggle
              entity: input_boolean.security_armed
        body:
          cards:
            - type: markdown
              content: |
                Interactions such as `swipe` and `context_menu` are configured in YAML and verified in behavior docs.
