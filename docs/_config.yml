# GitHub Pages configuration
title: Universal Card
description: Продвинутая карточка Lovelace для Home Assistant
url: https://mesteriis.github.io
baseurl: /universal-card

theme: null
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - README.md
  - CHANGELOG.md
  - LICENSE

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: docs
