name: Docs Screenshots

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: universal-card-docs-screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Europe/Madrid
      HA_FIXTURE_RUNTIME_DIR: /tmp/universal-card-ha-fixture-config

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies for docs assets
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        run: npm run build

      - name: Capture docs assets
        run: |
          npm run docs:assets:refresh 2>&1 | tee docs-assets.log

      - name: Upload docs assets artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-assets-${{ github.run_number }}
          path: |
            docs/img
            docs-assets.log
          retention-days: 14

      - name: Upload debug capture output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docs-assets-debug-${{ github.run_number }}
          path: |
            tests/screenshots/output/docs-assets
          retention-days: 7
