name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: universal-card-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Validate integration files
        run: |
          python3 -m json.tool manifest.json >/dev/null
          python3 -m compileall __init__.py >/dev/null

      - name: Validate config contract
        run: npm run test:config

      - name: Run regression suite
        run: npm run test:unit

      - name: Typecheck runtime and editor
        run: npm run typecheck

      - name: Run curated coverage gate
        run: npm run test:coverage

      - name: Run expanded coverage gate
        run: npm run test:coverage:expanded

      - name: Build production bundle
        run: npm run build

      - name: Verify generated artifacts are up to date
        run: git diff --exit-code -- universal-card.js lazy/

      - name: Smoke test theme and mode matrix
        run: npm run smoke:themes-modes

      - name: Smoke test runtime surface
        run: npm run smoke:runtime

      - name: Run browser E2E suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
